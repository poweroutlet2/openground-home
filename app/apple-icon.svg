<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="#09090b"/>
  <g fill="url(#grad)">
    <!-- Terminal prompt symbol -->
    <path d="M45 55l40 40-40 40" fill="none" stroke="url(#grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cursor line -->
    <path d="M100 115h55" stroke="url(#grad)" stroke-width="16" stroke-linecap="round"/>
    <!-- Small doc accent at bottom -->
